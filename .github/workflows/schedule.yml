name: Daily Scrape

on:
  schedule:
    - cron: "0 2 * * *"  # UTC 02:00 daily
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run scraper
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BILI_BUVID3: ${{ secrets.BILI_BUVID3 }}
          BILI_SESSDATA: ${{ secrets.BILI_SESSDATA }}
          BILI_BILI_JCT: ${{ secrets.BILI_BILI_JCT }}
          DAMAI_COOKIE2: ${{ secrets.DAMAI_COOKIE2 }}
          DAMAI_M_H5_TK: ${{ secrets.DAMAI_M_H5_TK }}
          DAMAI_APP_KEY: ${{ secrets.DAMAI_APP_KEY }}
        run: python main.py run

      - name: Upload events as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: events-data
          path: |
            events.json
            events.db
            comiradar.log
          retention-days: 7
